<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Portfolio</title>
    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* FUNDO E CENTRALIZAÇÃO */
        body {
            background: #f5f6fa;
            color: #2f3640;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* CONTEÚDO PRINCIPAL */
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 700px;
        }

        h1 {
            font-size: 26px;
            color: #1f2937;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 18px;
            color: #4b5563;
            font-weight: normal;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Welcome! I am Luis and I'm a Python programmer</h1>
    <h2>Here is some of my work</h2>
</div>

</body>
</html>
